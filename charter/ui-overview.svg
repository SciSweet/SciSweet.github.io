<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1060 320" xmlns="http://www.w3.org/2000/svg">
  <rect width="1060" height="320" fill="#09090b" rx="12"/>

  <!-- ===== Plugin Panel (center) ===== -->
  <g transform="translate(400,20)">
    <rect width="260" height="280" fill="#535353" rx="4" stroke="#2a2a2a" stroke-width="1"/>

    <!-- === Quick Actions (no title bar, section-no-title) === -->
    <g transform="translate(8,8)">
      <rect width="244" height="36" fill="#3d3d3d" rx="3" stroke="#2a2a2a" stroke-width="0.5"/>

      <!-- Row: Ω, Border, Midlines, Clear, Info, DelEmpty, DelHidden, Collapse -->
      <g transform="translate(4,4)" stroke="#b8b8b8" stroke-width="1.2" fill="none">
        <!-- btn backgrounds -->
        <g fill="#464646" stroke="#2a2a2a" stroke-width="0.5">
          <rect x="0" y="0" width="28" height="28" rx="2"/>
          <rect x="30" y="0" width="28" height="28" rx="2"/>
          <rect x="60" y="0" width="28" height="28" rx="2"/>
          <rect x="90" y="0" width="28" height="28" rx="2"/>
          <rect x="120" y="0" width="28" height="28" rx="2"/>
          <rect x="150" y="0" width="28" height="28" rx="2"/>
          <rect x="180" y="0" width="28" height="28" rx="2"/>
          <rect x="210" y="0" width="26" height="28" rx="2"/>
        </g>

        <!-- 1: Ω (Special Character) -->
        <g transform="translate(4,3) scale(0.92)">
          <text x="12" y="19" text-anchor="middle" font-size="22" fill="#e8e8e8" stroke="none" font-family="Arial,sans-serif">Ω</text>
        </g>

        <!-- 2: Border (rectangle) -->
        <g transform="translate(34,3) scale(0.92)">
          <rect x="1" y="1" width="22" height="22" stroke-width="2"/>
        </g>

        <!-- 3: Midlines (cross) -->
        <g transform="translate(64,3) scale(0.92)">
          <line x1="12" y1="1" x2="12" y2="23" stroke-width="2"/>
          <line x1="1" y1="12" x2="23" y2="12" stroke-width="2"/>
        </g>

        <!-- 4: Clear Guides (trash + grid lines, "has guides" complete state) -->
        <g transform="translate(94,2) scale(0.92)">
          <path d="M8 3 L8 1.5 C8 1 9 1 10 1 L14 1 C15 1 16 1 16 1.5 L16 3" stroke-width="2" fill="none" stroke-linecap="round"/>
          <rect x="4" y="3" width="16" height="2.5" rx="1" stroke-width="2" fill="none"/>
          <rect x="5" y="5.5" width="14" height="17" rx="1" stroke-width="2" fill="none"/>
          <line x1="9" y1="9" x2="9" y2="19" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="9" x2="12" y2="19" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="15" y1="9" x2="15" y2="19" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="7" y1="11.5" x2="17" y2="11.5" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="7" y1="14" x2="17" y2="14" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="7" y1="16.5" x2="17" y2="16.5" stroke-width="1.5" stroke-linecap="round"/>
        </g>

        <!-- 5: Info (circle + i) -->
        <g transform="translate(124,3) scale(0.92)">
          <circle cx="12" cy="12" r="11" stroke-width="2" fill="none"/>
          <circle cx="12" cy="7" r="1.5" fill="#ff4444" stroke="none"/>
          <line x1="12" y1="11" x2="12" y2="18" stroke-width="2.5" stroke-linecap="round" stroke="#ff4444"/>
        </g>

        <!-- 6: Delete Empty Layers (trash + dashed rect, static complete state) -->
        <g transform="translate(154,2) scale(0.92)">
          <path d="M8 3 L8 1.5 C8 1 9 1 10 1 L14 1 C15 1 16 1 16 1.5 L16 3" stroke-width="2" fill="none" stroke-linecap="round"/>
          <rect x="4" y="3" width="16" height="2.5" rx="1" stroke-width="2" fill="none"/>
          <rect x="5" y="5.5" width="14" height="17" rx="1" stroke-width="2" fill="none"/>
          <rect x="8" y="11" width="8" height="6" rx="1" fill="none" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="2,1"/>
        </g>

        <!-- 7: Delete Hidden Layers (trash + closed eye) -->
        <g transform="translate(184,2) scale(0.92)">
          <path d="M8 3 L8 1.5 C8 1 9 1 10 1 L14 1 C15 1 16 1 16 1.5 L16 3" stroke-width="2" fill="none" stroke-linecap="round"/>
          <rect x="4" y="3" width="16" height="2.5" rx="1" stroke-width="2" fill="none"/>
          <rect x="5" y="5.5" width="14" height="17" rx="1" stroke-width="2" fill="none"/>
          <ellipse cx="12" cy="14" rx="5" ry="3" stroke-width="1.5" fill="none" stroke="#ff4444"/>
          <line x1="7" y1="11" x2="17" y2="17" stroke-width="1.5" stroke="#ff4444" stroke-linecap="round"/>
        </g>

        <!-- 8: Collapse All (triple chevron up) -->
        <g transform="translate(213,3) scale(0.88)">
          <polyline points="6,12 12,6 18,12" stroke-width="2"/>
          <polyline points="6,17 12,11 18,17" stroke-width="2"/>
          <polyline points="6,22 12,16 18,22" stroke-width="2"/>
        </g>
      </g>
    </g>

    <!-- === Phrase Bank (collapsed) === -->
    <g transform="translate(8,52)">
      <rect width="244" height="30" fill="#3d3d3d" rx="3" stroke="#2a2a2a" stroke-width="0.5"/>
      <text x="10" y="20" font-family="Arial,sans-serif" font-size="10.5" fill="#e8e8e8" font-weight="500">Phrase Bank</text>
      <polyline points="230,11 234,16 238,11" fill="none" stroke="#b8b8b8" stroke-width="1.5" transform="rotate(-90,234,14)"/>
    </g>

    <!-- === Bar Resizer (collapsed) === -->
    <g transform="translate(8,90)">
      <rect width="244" height="30" fill="#3d3d3d" rx="3" stroke="#2a2a2a" stroke-width="0.5"/>
      <text x="10" y="20" font-family="Arial,sans-serif" font-size="10.5" fill="#e8e8e8" font-weight="500">Bar Resizer</text>
      <polyline points="230,11 234,16 238,11" fill="none" stroke="#b8b8b8" stroke-width="1.5" transform="rotate(-90,234,14)"/>
    </g>

    <!-- === Significance Mark (collapsed) === -->
    <g transform="translate(8,128)">
      <rect width="244" height="30" fill="#3d3d3d" rx="3" stroke="#2a2a2a" stroke-width="0.5"/>
      <text x="10" y="20" font-family="Arial,sans-serif" font-size="10.5" fill="#e8e8e8" font-weight="500">Significance Mark</text>
      <polyline points="230,11 234,16 238,11" fill="none" stroke="#b8b8b8" stroke-width="1.5" transform="rotate(-90,234,14)"/>
    </g>

    <!-- === Adv Line Marker (collapsed) === -->
    <g transform="translate(8,166)">
      <rect width="244" height="30" fill="#3d3d3d" rx="3" stroke="#2a2a2a" stroke-width="0.5"/>
      <text x="10" y="20" font-family="Arial,sans-serif" font-size="10.5" fill="#e8e8e8" font-weight="500">Adv Line Marker</text>
      <polyline points="230,11 234,16 238,11" fill="none" stroke="#b8b8b8" stroke-width="1.5" transform="rotate(-90,234,14)"/>
    </g>

    <!-- === Edit Char Style (collapsed) === -->
    <g transform="translate(8,204)">
      <rect width="244" height="30" fill="#3d3d3d" rx="3" stroke="#2a2a2a" stroke-width="0.5"/>
      <text x="10" y="20" font-family="Arial,sans-serif" font-size="10.5" fill="#e8e8e8" font-weight="500">Edit Char Style</text>
      <polyline points="230,11 234,16 238,11" fill="none" stroke="#b8b8b8" stroke-width="1.5" transform="rotate(-90,234,14)"/>
    </g>

    <!-- === Table Tool (collapsed) === -->
    <g transform="translate(8,242)">
      <rect width="244" height="30" fill="#3d3d3d" rx="3" stroke="#2a2a2a" stroke-width="0.5"/>
      <text x="10" y="20" font-family="Arial,sans-serif" font-size="10.5" fill="#e8e8e8" font-weight="500">Table Tool</text>
      <polyline points="230,11 234,16 238,11" fill="none" stroke="#b8b8b8" stroke-width="1.5" transform="rotate(-90,234,14)"/>
    </g>
  </g>

  <!-- ===== Annotations (alternating left / right) ===== -->

  <!-- Quick Actions: Symbols & Guides — LEFT -->
  <circle cx="400" cy="34" r="2.5" fill="#3b82f6"/>
  <line x1="400" y1="34" x2="370" y2="34" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2"/>
  <g transform="translate(30,24)">
    <text text-anchor="end" x="340" font-family="Arial,sans-serif" font-size="14" fill="#ededf0" font-weight="600">Symbols &amp; Guides</text>
    <text text-anchor="end" x="340" y="18" font-family="Arial,sans-serif" font-size="11.5" fill="#8b8b97">Copy special characters, add and clear guides.</text>
  </g>

  <!-- Quick Actions: Layer Info & Cleanup — RIGHT -->
  <circle cx="660" cy="46" r="2.5" fill="#3b82f6"/>
  <line x1="660" y1="46" x2="690" y2="46" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2"/>
  <g transform="translate(698,36)">
    <text font-family="Arial,sans-serif" font-size="14" fill="#ededf0" font-weight="600">Layer Info &amp; Cleanup</text>
    <text y="18" font-family="Arial,sans-serif" font-size="11.5" fill="#8b8b97">Inspect layers, delete empty and hidden ones.</text>
  </g>

  <!-- Phrase Bank — RIGHT -->
  <circle cx="660" cy="87" r="2.5" fill="#3b82f6"/>
  <line x1="660" y1="87" x2="690" y2="87" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2"/>
  <g transform="translate(698,75)">
    <text font-family="Arial,sans-serif" font-size="14" fill="#ededf0" font-weight="600">Phrase Bank</text>
    <text y="18" font-family="Arial,sans-serif" font-size="11.5" fill="#8b8b97">Save and quickly paste reusable text snippets.</text>
  </g>

  <!-- Bar Resizer — LEFT -->
  <circle cx="400" cy="125" r="2.5" fill="#3b82f6"/>
  <line x1="400" y1="125" x2="370" y2="125" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2"/>
  <g transform="translate(30,115)">
    <text text-anchor="end" x="340" font-family="Arial,sans-serif" font-size="14" fill="#ededf0" font-weight="600">Bar Resizer</text>
    <text text-anchor="end" x="340" y="18" font-family="Arial,sans-serif" font-size="11.5" fill="#8b8b97">Proportionally resize chart bars by data ratio.</text>
  </g>

  <!-- Significance Mark — RIGHT -->
  <circle cx="660" cy="163" r="2.5" fill="#3b82f6"/>
  <line x1="660" y1="163" x2="690" y2="163" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2"/>
  <g transform="translate(698,151)">
    <text font-family="Arial,sans-serif" font-size="14" fill="#ededf0" font-weight="600">Significance Mark</text>
    <text y="18" font-family="Arial,sans-serif" font-size="11.5" fill="#8b8b97">Add statistical brackets with text and sticks.</text>
  </g>

  <!-- Adv Line Marker — LEFT -->
  <circle cx="400" cy="201" r="2.5" fill="#3b82f6"/>
  <line x1="400" y1="201" x2="370" y2="201" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2"/>
  <g transform="translate(30,191)">
    <text text-anchor="end" x="340" font-family="Arial,sans-serif" font-size="14" fill="#ededf0" font-weight="600">Adv Line Marker</text>
    <text text-anchor="end" x="340" y="18" font-family="Arial,sans-serif" font-size="11.5" fill="#8b8b97">Multi-row stacked lines and labels from guides.</text>
  </g>

  <!-- Edit Char Style — RIGHT -->
  <circle cx="660" cy="239" r="2.5" fill="#3b82f6"/>
  <line x1="660" y1="239" x2="690" y2="239" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2"/>
  <g transform="translate(698,227)">
    <text font-family="Arial,sans-serif" font-size="14" fill="#ededf0" font-weight="600">Edit Char Style</text>
    <text y="18" font-family="Arial,sans-serif" font-size="11.5" fill="#8b8b97">Batch find-and-style text across layers.</text>
  </g>

  <!-- Table Tool — LEFT -->
  <circle cx="400" cy="277" r="2.5" fill="#3b82f6"/>
  <line x1="400" y1="277" x2="370" y2="277" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2"/>
  <g transform="translate(30,267)">
    <text text-anchor="end" x="340" font-family="Arial,sans-serif" font-size="14" fill="#ededf0" font-weight="600">Table Tool</text>
    <text text-anchor="end" x="340" y="18" font-family="Arial,sans-serif" font-size="11.5" fill="#8b8b97">Create tables with merge, text, and grid styles.</text>
  </g>
</svg>
