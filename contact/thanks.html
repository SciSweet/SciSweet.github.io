<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#09090b">
    <title>Message Sent — SciSuite</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32x32.png">
    <link rel="icon" type="image/x-icon" href="../img/favicon.ico">
    <style>
        :root {
            --c-bg: #09090b; --c-bg-card: #141417; --c-border: #222228;
            --c-text: #ededf0; --c-text-secondary: #8b8b97; --c-text-muted: #55555f;
            --c-accent: #3b82f6; --c-accent-glow: rgba(59,130,246,0.10);
            --c-accent-2: #10b981;
            --font-display: Arial, Helvetica, sans-serif; --font-body: Arial, Helvetica, sans-serif;
            --r-md: 12px; --r-xl: 28px; --ease: 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body); background: var(--c-bg); color: var(--c-text);
            line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding: 40px 24px; -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999;
        }
        @keyframes fu { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .card {
            background: var(--c-bg-card); border: 1px solid var(--c-border);
            border-radius: var(--r-xl); padding: 60px 48px; max-width: 520px;
            animation: fu 0.7s ease backwards;
        }
        .check {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.18);
            display: grid; place-items: center; margin: 0 auto 24px;
        }
        .check svg { width: 32px; height: 32px; color: var(--c-accent-2); }
        h1 { font-family: var(--font-display); font-size: 28px; font-weight: 400; margin-bottom: 12px; }
        p { font-size: 15px; color: var(--c-text-secondary); line-height: 1.7; margin-bottom: 32px; }
        .btn {
            display: inline-flex; align-items: center; gap: 9px;
            padding: 13px 26px; border-radius: var(--r-md);
            font-size: 14.5px; font-weight: 500; font-family: var(--font-body);
            border: none; cursor: pointer; transition: all var(--ease);
            background: var(--c-accent); color: #fff; text-decoration: none;
            box-shadow: 0 0 0 0 var(--c-accent-glow), 0 4px 20px rgba(59,130,246,0.25);
        }
        .btn:hover { background: #4b8ef7; box-shadow: 0 0 0 4px var(--c-accent-glow), 0 8px 28px rgba(59,130,246,0.35); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <h1>Message Sent!</h1>
        <p>Thank you for reaching out. We will get back to you as soon as possible, usually within 3 business days.</p>
        <a href="../index.html" class="btn">Back to Home</a>
    </div>
</body>
</html>
