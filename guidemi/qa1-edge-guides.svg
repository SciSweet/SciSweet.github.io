       B: t=105 b=185 l=160 r=280 hm=145 vm=220
       Combined: t=15 b=185 l=20 r=280 hm=100 vm=150

       24s, 16 steps × 1.5s each
       f0-1:   Top individual (A:y=15, B:y=105)
       f2-3:   Top combined (y=15)
       f4-5:   Bottom individual (A:y=95, B:y=185)
       f6-7:   Bottom combined (y=185)
       f8-9:   Left individual (A:x=20, B:x=160)
       f10-11: Left combined (x=20)
       f12-13: Right individual (A:x=140, B:x=280)
       f14-15: Right combined (x=280)
       f16-17: H-Center individual (A:y=55, B:y=145)
       f18-19: H-Center combined (y=100)
       f20-21: V-Center individual (A:x=80, B:x=220)
       f22-23: V-Center combined (x=150)
       f24-25: Border individual (A:4edges, B:4edges)
       f26-27: Border combined (4edges)
       f28-29: Midlines individual (A:2mid, B:2mid)
       f30-31: Midlines combined (2mid)
